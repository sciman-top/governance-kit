name: Bug report
description: 报告脚本缺陷、回归或行为异常
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息，便于快速定位问题。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要描述问题现象
      placeholder: 在执行 xxx 脚本时出现 xxx
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供最小可复现步骤
      placeholder: |
        1. 执行命令 ...
        2. 使用参数 ...
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为与关键输出
      description: 请贴关键日志（可脱敏）
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 相关版本
      description: governance-kit 版本 / 分支 / commit
      placeholder: v3.81 / main / abc1234
  - type: dropdown
    id: risk
    attributes:
      label: 风险等级
      options:
        - low
        - medium
        - high
    validations:
      required: true
