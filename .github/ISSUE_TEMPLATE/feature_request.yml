name: Feature request
description: 提议治理能力增强或流程改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 现状问题
      description: 你想解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的行为或接口
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其它方式
  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性影响
      description: 是否影响现有契约、配置结构或回滚路径
  - type: dropdown
    id: risk
    attributes:
      label: 风险等级
      options:
        - low
        - medium
        - high
    validations:
      required: true
