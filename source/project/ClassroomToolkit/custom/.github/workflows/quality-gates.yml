name: quality-gates

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run governance fast check (if exists)
        shell: pwsh
        run: |
          if (Test-Path "scripts/governance/fast-check.ps1") {
            powershell -File scripts/governance/fast-check.ps1
          } else {
            Write-Host "No governance fast-check script found, skip."
          }

      - name: Run local quality gates (if exists)
        shell: pwsh
        run: |
          if (Test-Path "scripts/quality/run-local-quality-gates.ps1") {
            powershell -ExecutionPolicy Bypass -File scripts/quality/run-local-quality-gates.ps1 -Profile quick -EmitGovernanceReport
          } else {
            Write-Host "No project quality script found, skip."
          }

      - name: Upload Governance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-governance-reports
          path: docs/governance/reports
          if-no-files-found: warn
