name: quality-gate

on:
  pull_request:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refactor Doc Consistency Gate
        shell: pwsh
        run: |
          $report = & powershell -ExecutionPolicy Bypass -File scripts/refactor/check-doc-consistency.ps1 -AsJson
          $report
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Refactor doc consistency check failed."
            exit $LASTEXITCODE
          }

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore (locked mode)
        run: dotnet restore ClassroomToolkit.sln --locked-mode

      - name: Vulnerability Gate
        shell: pwsh
        run: |
          $report = dotnet list ClassroomToolkit.sln package --vulnerable --include-transitive
          $report
          $hasVuln = $report | Select-String -Pattern "has the following vulnerable packages|具有下列易受攻击的包" -SimpleMatch
          if ($hasVuln) {
            Write-Error "Vulnerable NuGet packages detected."
            exit 1
          }

      - name: Build Debug (warnings as errors)
        run: dotnet build ClassroomToolkit.sln -c Debug --no-restore /warnaserror

      - name: Architecture And Interop Contracts
        run: >
          dotnet test tests/ClassroomToolkit.Tests/ClassroomToolkit.Tests.csproj -c Debug --no-build
          --filter "FullyQualifiedName~ArchitectureDependencyTests|FullyQualifiedName~InteropHookLifecycleContractTests|FullyQualifiedName~InteropHookEventDispatchContractTests|FullyQualifiedName~GlobalHookServiceLifecycleContractTests|FullyQualifiedName~CrossPageDisplayLifecycleContractTests"

      - name: Hotspot Budget Gate
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/quality/check-hotspot-line-budgets.ps1

      - name: Waiver Health Gate
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/governance/check-waiver-health.ps1

      - name: Evidence Completeness Gate (All)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/governance/check-evidence-completeness.ps1 -Mode all -Threshold 98

      - name: Endstate Doctor Gate (All)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/governance/run-doctor-endstate.ps1 -EvidenceMode all -EvidenceThreshold 98

      - name: Resolve Stable Profile
        id: stable_profile
        shell: pwsh
        run: |
          $profile = & powershell -ExecutionPolicy Bypass -File scripts/validation/resolve-stable-profile.ps1 `
            -Pipeline "quality-gate" `
            -EventName "${{ github.event_name }}"
          "profile=$profile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stable Test Profile
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/validation/run-stable-tests.ps1 `
            -Configuration Debug `
            -SkipBuild `
            -Profile "${{ steps.stable_profile.outputs.profile }}"

      - name: Full Debug Tests With Coverage
        run: >
          dotnet test tests/ClassroomToolkit.Tests/ClassroomToolkit.Tests.csproj -c Debug --no-build
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/TestResults/Debug
          --logger "trx;LogFileName=debug.trx"
          --blame-hang --blame-hang-timeout 5m

      - name: Build Release (warnings as errors)
        run: dotnet build ClassroomToolkit.sln -c Release --no-restore /warnaserror

      - name: Release Compatibility Preflight
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/release/preflight-check.ps1 -SkipTests

      - name: Full Release Tests
        run: >
          dotnet test tests/ClassroomToolkit.Tests/ClassroomToolkit.Tests.csproj -c Release --no-build
          --results-directory artifacts/TestResults/Release
          --logger "trx;LogFileName=release.trx"
          --blame-hang --blame-hang-timeout 5m

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-test-results
          path: artifacts/TestResults
          if-no-files-found: warn

      - name: Upload Stable Test Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-stable-test-summary
          path: |
            artifacts/TestResults/stable-tests-summary.json
            artifacts/TestResults/stable-tests-entries
          if-no-files-found: warn

      - name: Upload Governance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-governance-reports
          path: docs/governance/reports
          if-no-files-found: warn
