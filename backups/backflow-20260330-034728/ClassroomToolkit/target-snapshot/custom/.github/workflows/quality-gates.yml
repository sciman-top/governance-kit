name: quality-gates

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run local quality gates (if exists)
        shell: pwsh
        run: |
          if (Test-Path "scripts/quality/run-local-quality-gates.ps1") {
            powershell -File scripts/quality/run-local-quality-gates.ps1 -Profile quick
          } else {
            Write-Host "No project quality script found, skip."
          }
